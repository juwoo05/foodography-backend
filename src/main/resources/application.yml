spring:
  application:
    name: server

  profiles:
    include: secret

  datasource:
    driver-class-name: org.mariadb.jdbc.Driver

  mail:
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            enable: true

  jpa:
    generate-ddl: false
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 100  # MariaDB 배치 INSERT 성능 최적화
        order_inserts: true

  cloud:
    aws:
      s3:
        bucket: my-fridge-415851145587-input
      region:
        static: ap-northeast-2
      stack:
        auto: false

  data:
    redis:
      host: 52.79.63.159  # 운영 환경은 secret 에서 덮어씀
      port: 6379
      client-type: lettuce
      timeout: 2s
      lettuce:
        pool:
          max-active: 32
          max-idle: 16
          min-idle: 4
          max-wait: 5s

  webflux:
    # WebClient는 MVC와 공존 — 서버 활성화 X, Bean 생성 용도만
    codec:
      max-in-memory-size: 10MB

  # ── Spring AI ───────────────────────────────────────────────────────────────
  ai:
    model:
      chat: bedrock-converse    # ChatModel      → BedrockConverseChatModel
      embedding: bedrock-titan  # EmbeddingModel → BedrockTitanEmbeddingModel
                                # bedrock-titan 지정 시 Cohere 등 나머지 자동 비활성화

    bedrock:
      aws:
        region: us-east-1  # Titan Embed v1 지원 리전 (S3 리전 ap-northeast-2 와 별개)
        # access-key / secret-key 는 application-secret.yml 에서 주입
      converse:
        chat:
          options:
            model: anthropic.claude-3-haiku-20240307-v1:0
            max-tokens: 512
      titan:
        embedding:
          model: amazon.titan-embed-text-v2:0  # 1024 차원 텍스트 임베딩 (v1 서비스 종료)
          input-type: TEXT

    vectorstore:
      pinecone:
        index-name: food-nutrition-index
        namespace: food-db
        content-field-name: document_content  # 공식 문서 기본값
        # api-key 는 application-secret.yml 에서 주입

jwt:
  token:
    creator: Foodography
    access:
      valid:
        time: 1800        # 30분 — Access Token 유효시간 (초)
      name: jwtAccessToken
    refresh:
      valid:
        time: 604800      # 7일 — Refresh Token 유효시간 (초)
      name: jwtRefreshToken
  secret:
    key:                  # 실제 키는 application-secret.yml 에서만 주입

# ── FastAPI 서버 주소 ────────────────────────────────────────────────────────
fastapi:
  base-url: http://localhost:8000  # 로컬 기본값, 운영은 secret 에서 덮어씀

# ── 식품안전처 식품영양성분 DB API ──────────────────────────────────────────────
food-safety:
  base-url: https://apis.data.go.kr/1471000/FoodNtrCpntDbInfo02/getFoodNtrCpntDbInq02
  api-key: CHANGE_ME_IN_SECRET      # secret 에서 실제 키로 덮어씀

# ── YouTube Data API v3 ────────────────────────────────────────────────────
# Google Cloud Console → API 및 서비스 → YouTube Data API v3 활성화 후 키 발급
# https://console.cloud.google.com/apis/credentials
youtube:
  data:
    base-url: https://www.googleapis.com/youtube/v3
    api-key: CHANGE_ME_IN_SECRET    # secret 에서 실제 키로 덮어씀

# Enable cache/Redis logging to see hits and misses
logging:
  level:
    org:
      springframework:
        cache: TRACE
        data:
          redis: INFO